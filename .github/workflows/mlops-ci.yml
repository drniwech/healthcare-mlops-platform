name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPO: mlops-repo
  IMAGE: healthcare-mlops

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # ✅ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r requirements.txt

    # ✅ Lint code
    - name: Lint with flake8
      run: |
        flake8 api training pipeline monitoring --max-line-length=120

    # 🔐 Authenticate to GCP
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # ☁️ Setup gcloud
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    # 🐳 Configure Docker
    - name: Configure Docker
      run: |
        gcloud auth configure-docker $REGION-docker.pkg.dev

    # 🏗 Build Docker image
    - name: Build Docker image
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:latest .

    # 🚀 Push Docker image
    - name: Push Docker image
      run: |
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:latest

    # 🔁 Trigger Vertex AI Pipeline
    - name: Trigger Vertex AI Pipeline
      run: |
        python pipeline/pipeline.py run
